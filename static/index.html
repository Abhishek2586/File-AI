        linear-gradient(to bottom, rgba(0, 0, 0, 0.06) 1px, transparent 1px);
      background-size: 400px 400px, 40px 40px, 40px 40px;
    }

    .swiss {
      border: 1px solid #000;
    }

    .nav-active {
      border-left: 3px solid #FF4F00;
      background: #F4F4F5;
    }

    details>summary {

    #main-content {

<body class="bg-white text-slate-900">
  <div id="app"></div>

  <script>
    // ── State ────────────────────────────────────────────────────────────────
    const state = {
      user: null,
      settings: { model: 'gpt-3.5-turbo', temperature: 0.3, max_tokens: 600, top_k: 5 },
      docsCount: 4
    };

    // ── API Helper ────────────────────────────────────────────────────────────
    async function api(method, path, body) {
      const opts = { method, credentials: 'include', headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const r = await fetch(path, opts);
      return r.json();
    }

    // ── Shell HTML ────────────────────────────────────────────────────────────
    function sidebarHTML(active) {
      const pages = [
        ['dashboard', 'Dashboard', 'dashboard'],
        ['chat', 'AI Chat Assistant', 'chat'],
        ['insights', 'Key Insights', 'lightbulb'],
        ['documents', 'Document Explorer', 'folder'],
        ['faq', 'FAQ', 'help'],
        ['history', 'Search History', 'history'],
        ['settings', 'Settings', 'settings'],
        ['profile', 'Profile', 'person']
      ];
      const links = pages.map(([id, label, icon]) => {
        const isActive = active === id;
        return `<a href="#${id}" class="flex items-center gap-3 px-6 py-3 text-[11px] font-bold uppercase tracking-wider transition-colors ${isActive ? 'nav-active text-black' : 'text-slate-600 hover:bg-[#F4F4F5]'}">
      <span class="material-symbols-outlined text-[18px]">${icon}</span>${label}</a>`;
      }).join('');
      return `<aside class="w-[240px] h-screen flex-shrink-0 border-r border-black bg-white flex flex-col fixed left-0 top-0 z-40">
    <div class="p-6 border-b border-black">
      <h1 class="font-serif text-2xl font-bold text-black leading-none">FileAI</h1>
      <p class="font-mono text-[10px] text-slate-500 mt-1 uppercase tracking-tight">AI-Based Smart File Assistant</p>
    </div>
    <nav class="flex-1 py-2 overflow-y-auto flex flex-col">${links}</nav>
    <div class="p-6 border-t border-black">
      <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">Knowledge Base</p>
      <div class="inline-flex items-center gap-2 swiss px-2 py-1">
        <span class="material-symbols-outlined text-[14px]">database</span>
        <span id="docs-badge" class="font-mono text-[10px] font-bold uppercase">${state.docsCount} DOCS LOADED</span>
      </div>
    </div>
  </aside>`;
    }

    function headerHTML(title, pageName) {
      const u = state.user || {};
      const initials = u.initials || 'JD';
      const name = u.name || 'John Doe';
      return `<header class="h-16 border-b border-black bg-white flex items-center justify-between px-8 fixed top-0 left-[240px] right-0 z-30">
    <div class="flex flex-col justify-center">
      <h2 class="font-serif text-[18px] font-bold text-black leading-none">${title}</h2>
      <span class="font-mono text-[11px] text-slate-500 mt-0.5">FileAI / ${pageName}</span>
    </div>
    <div class="flex items-center gap-4">
      <div class="w-9 h-9 bg-black flex items-center justify-center text-white font-bold text-xs">${initials}</div>
      <span class="text-[13px] font-medium">${name}</span>
      <div class="w-px h-4 bg-slate-300"></div>
      <button onclick="doLogout()" class="text-[13px] text-slate-600 hover:underline">Logout</button>
    </div>
  </header>`;
    }

    function shellWrap(active, title, pageName, contentHTML) {
      return `${sidebarHTML(active)}
  ${headerHTML(title, pageName)}
  <div class="ml-[240px] pt-16 min-h-screen">
    <main id="main-content" class="p-8 overflow-y-auto">${contentHTML}</main>
  </div>`;
    }

    // ── Router ─────────────────────────────────────────────────────────────────
    const app = document.getElementById('app');

    async function route() {
      const hash = location.hash.replace('#', '') || 'landing';
      document.body.parentElement.setAttribute('data-route', hash);
      const appDiv = document.getElementById('app');
      if (appDiv) appDiv.setAttribute('data-route', hash);

      const meRes = await api('GET', '/api/me');
      if (meRes.authenticated) state.user = meRes.user;

      if (['landing', 'login', 'signup', 'forgot-password'].includes(hash)) {
        if (meRes.authenticated && hash === 'login') { location.hash = 'dashboard'; return; }

        if (hash === 'landing') return renderLanding();
        if (hash === 'login') return renderLogin();
        if (hash === 'signup') return renderSignup();
        if (hash === 'forgot-password') return renderForgotPassword();
        return;
      }

      if (!meRes.authenticated) { location.hash = 'login'; return; }

      // Load docs count in background
      api('GET', '/api/documents/count').then(d => { if (d.documents != null) { state.docsCount = d.documents; const b = document.getElementById('docs-badge'); if (b) b.textContent = d.documents + ' DOCS LOADED'; } });

      switch (hash) {
        case 'dashboard': return renderDashboard();
        case 'chat': return renderChat();
        case 'insights': return renderInsights();
        case 'documents': return renderDocuments();
        case 'faq': return renderFAQ();
        case 'history': return renderHistory();
        case 'settings': return renderSettings();
        case 'profile': return renderProfile();
        default: location.hash = 'dashboard';
      }
    }

    window.addEventListener('hashchange', route);
    window.addEventListener('DOMContentLoaded', route);

    async function doLogout() {
      await api('POST', '/api/logout');
      state.user = null;
      location.hash = 'login';
    }

      function parseMarkdown(text) {
        if (!text) return '';
        return text
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/^###### (.*?)$/gm, '<h6 class="font-bold text-[11px] mt-2 mb-1 uppercase tracking-widest text-slate-500">$1</h6>')
          .replace(/^##### (.*?)$/gm, '<h5 class="font-bold text-[12px] mt-2 mb-1 uppercase tracking-wider text-slate-600">$1</h5>')
          .replace(/^#### (.*?)$/gm, '<h4 class="font-bold text-[13px] mt-3 mb-1 uppercase text-slate-800">$1</h4>')
          .replace(/^### (.*?)$/gm, '<h3 class="font-bold text-[15px] mt-4 mb-1">$1</h3>')
          .replace(/^## (.*?)$/gm, '<h2 class="font-bold text-base mt-5 mb-2">$1</h2>')
          .replace(/^# (.*?)$/gm, '<h1 class="font-serif font-bold text-lg mt-5 mb-2">$1</h1>')
          .replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold">$1</strong>')
          .replace(/\*(.*?)\*/g, '<em class="italic">$1</em>')
          .replace(/`(.*?)`/g, '<code class="bg-slate-100 text-primary px-1 py-0.5 font-mono text-[11px]">$1</code>')
          .replace(/\(?\[([^\]]+)\]\)?/g, function (match, inner) {
            if (inner.toLowerCase().includes('.pdf') || inner.toLowerCase().includes('pg ') || inner.toLowerCase().includes('p.')) {
              return `<span class="inline-block bg-slate-100 border border-slate-200 text-slate-500 font-mono text-[9px] px-1.5 py-0.5 rounded-[3px] uppercase tracking-wider ml-1 shadow-sm align-middle">${inner}</span>`;
            }
            return match;
          })
          .replace(/\n/g, '<br>');
      }

      el.innerHTML = chatHistory.map((m, i) => {
        if (m.role === 'user') {
          return `<div class="flex flex-col items-end">

        const srcs = (m.sources || []).map(s => `<div class="flex items-center gap-2 py-1 border-b border-slate-100 last:border-0">

        const parsedContent = m.isHTML ? m.content : (m.role === 'assistant' ? parseMarkdown(m.content) : m.content.replace(/</g, '&lt;').replace(/>/g, '&gt;'));

        const copyButtonHTML = (!m.isHTML && m.role === 'assistant') ?

    async function copyMessage(idx) {
      const msg = chatHistory[idx];
      if (!msg) return;
      try {
        await navigator.clipboard.writeText(msg.content);
        const btn = document.getElementById('btn-copy-' + idx);
        if (btn) {
          const originalHTML = btn.innerHTML;
          btn.innerHTML = '<span class="material-symbols-outlined text-[12px] text-green-600">check</span><span class="font-mono text-[9px] font-bold uppercase tracking-wider text-green-600">Copied</span>';
          setTimeout(() => btn.innerHTML = originalHTML, 2000);
        }
      } catch (err) { }
    }

    function renderChatHistoryList() {
      const el = document.getElementById('chat-hist-list');
      if (!el) return;
      const userMsgs = chatHistory.filter(m => m.role === 'user');
      if (!userMsgs.length) { el.innerHTML = `<p class="px-6 py-4 font-mono text-[10px] text-slate-400">No history yet</p>`; return; }
      el.innerHTML = userMsgs.map((m, i) => `<div class="${i === userMsgs.length - 1 ? 'border-l-[3px] border-primary bg-[#F4F4F5]' : ''} px-5 py-3 border-b border-slate-100 cursor-pointer hover:bg-slate-50">
    <p class="font-mono text-[11px] truncate">${m.content}</p>
    <p class="font-mono text-[9px] text-slate-400 mt-1">${m.ts || ''}</p>
  </div>`).join('');
    }

    async function sendChat() {
      const input = document.getElementById('chat-input');
      const q = input.value.trim();
      if (!q) return;
      input.value = '';
      const ts = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

      // Push user message
      chatHistory.push({ role: 'user', content: q, ts });
      renderChatMessages();
      renderChatHistoryList();

      // Push initial assistant loading message
      const assistantMsg = {
        role: 'assistant',
        content: '<span class="font-mono text-[11px] text-slate-400 animate-pulse">Searching documents...</span>',
        ts,
        sources: [],
        isHTML: true
      };
      chatHistory.push(assistantMsg);
      renderChatMessages();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q, stream: true }),
          credentials: 'include'
        });

        if (!response.ok) {
          throw new Error(`HTTP Error: ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";
        let isFirstChunk = true;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n\n');
          buffer = lines.pop() || ""; // Keep the incomplete chunk in the buffer

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const dataStr = line.slice(6);
              try {
                const data = JSON.parse(dataStr);

                if (data.type === 'meta') {
                  if (data.error) {
                    assistantMsg.content = `<span class="text-red-600">${data.error}</span>`;
                  } else {
                    assistantMsg.content = ""; // Clear loading message
                    assistantMsg.isHTML = false;
                    assistantMsg.sources = data.sources || [];
                    assistantMsg.confidence = data.confidence || 0;
                  }
                  renderChatMessages();
                }
                else if (data.type === 'chunk') {
                  if (isFirstChunk) {
                    assistantMsg.content = ""; // Ensure loading text is cleared
                    assistantMsg.isHTML = false;
                    isFirstChunk = false;
                  }
                  assistantMsg.content += data.text;
                  renderChatMessages();
                }
                else if (data.type === 'done') {
                  assistantMsg.confidence = data.confidence;
                  renderChatMessages();
                  renderChatHistoryList();
                }
                else if (data.type === 'error') {
                  assistantMsg.content += `\n\n<span class="text-red-600">Error: ${data.error}</span>`;
                  assistantMsg.isHTML = true;
                  renderChatMessages();
                }
              } catch (e) {
                console.error("Error parsing SSE data", e, dataStr);
              }
            }
          }
        }
      } catch (err) {
        console.error("Chat error:", err);
        chatHistory.pop();
        chatHistory.push({ role: 'assistant', content: `<span class="text-red-600">Connection error: ${err.message}</span>`, ts, sources: [], isHTML: true });
        renderChatMessages();
      }
      renderChatHistoryList();
    }
