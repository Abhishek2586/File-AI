name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run unit tests (no API)
      env:
        OPENAI_API_KEY: dummy_key_for_unit_tests
      run: |
        python -m pytest tests/test_text_cleaner.py tests/test_chunker.py -v
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 modules/ --max-line-length=120 --ignore=E501,W503

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: docker build -t ai-file-assistant:${{ github.sha }} .
